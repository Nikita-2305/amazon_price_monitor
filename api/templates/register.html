<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — BearingWatch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #d6f0f0 0%, #e8f5f5 50%, #f5fbfb 100%);
    min-height: 100vh;
  }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 60px; background: #fff;
    border-bottom: 1px solid #e0eeee;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon {
    width: 42px; height: 42px; background: #1a8c8c;
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 24px; height: 24px; }
  .logo-name { font-size: 22px; font-weight: 700; color: #1a3a3a; }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-links a { text-decoration: none; color: #1a3a3a; font-size: 15px; }
  .btn-outline {
    padding: 9px 24px; border: 1.5px solid #1a3a3a;
    border-radius: 8px; font-size: 15px; font-weight: 500;
    background: transparent; cursor: pointer; color: #1a3a3a;
    text-decoration: none;
  }
  .container {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 80px); padding: 40px 20px;
  }
  .card {
    background: #fff; border-radius: 20px;
    padding: 48px 44px; width: 100%; max-width: 460px;
    box-shadow: 0 4px 40px rgba(26,140,140,0.08);
  }
  .card h1 {
    font-size: 34px; font-weight: 800; color: #1a3a3a;
    text-align: center; margin-bottom: 8px;
  }
  .card .subtitle {
    text-align: center; color: #4a6a6a; font-size: 14px; margin-bottom: 28px;
  }
  .error-msg {
    background: #fff0f0; border: 1px solid #ffcccc;
    color: #cc3333; padding: 10px 14px; border-radius: 8px;
    margin-bottom: 20px; font-size: 14px; text-align: center;
  }
  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 14px; font-weight: 600;
    color: #1a3a3a; margin-bottom: 8px;
  }
  .input-wrap {
    display: flex; align-items: center;
    border: 1.5px solid #d0e8e8; border-radius: 10px;
    padding: 12px 16px; background: #f8fbfb; transition: border 0.2s;
  }
  .input-wrap:focus-within { border-color: #1a8c8c; background: #fff; }
  .input-wrap svg { width: 18px; height: 18px; stroke: #8aacac; flex-shrink: 0; }
  .input-wrap input {
    border: none; background: transparent; outline: none;
    font-size: 15px; color: #1a3a3a; width: 100%; margin-left: 10px;
  }
  .input-wrap input::placeholder { color: #9ab8b8; }
  .btn-submit {
    width: 100%; padding: 15px;
    background: #1a8c8c; color: #fff; border: none;
    border-radius: 10px; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px; transition: background 0.2s;
  }
  .btn-submit:hover { background: #157070; }
  .footer-link {
    text-align: center; margin-top: 24px;
    font-size: 14px; color: #4a6a6a;
  }
  .footer-link a { color: #1a8c8c; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <polyline points="3,17 9,11 13,15 21,7"/>
      </svg>
    </div>
    <span class="logo-name">BearingWatch</span>
  </a>
  <div class="nav-links">
    <a href="/">About us</a>
    <a href="/login" class="btn-outline">Login</a>
  </div>
</nav>

<div class="container">
  <div class="card">
    <h1>Create account</h1>
    <p class="subtitle">Start monitoring bearing prices on Amazon India</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="field">
        <label>Full name</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input type="text" name="name" placeholder="Your full name" required/>
        </div>
      </div>

      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
          <input type="email" name="email" placeholder="Email address" required/>
        </div>
      </div>

      <div class="field">
        <label>Company name</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
          <input type="text" name="company" placeholder="Your company name" required/>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" name="password" placeholder="Create a password" required/>
        </div>
      </div>

      <button type="submit" class="btn-submit">Create account</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="/login">Login here</a>
    </div>
  </div>
</div>

</body>
</html>
