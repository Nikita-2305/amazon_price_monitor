<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — BearingWatch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #d6f0f0 0%, #e8f5f5 50%, #f5fbfb 100%);
    min-height: 100vh;
  }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 60px; background: #fff;
    border-bottom: 1px solid #e0eeee;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon {
    width: 42px; height: 42px; background: #1a8c8c;
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 24px; height: 24px; }
  .logo-name { font-size: 22px; font-weight: 700; color: #1a3a3a; }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-links a { text-decoration: none; color: #1a3a3a; font-size: 15px; }
  .btn-outline {
    padding: 9px 24px; border: 1.5px solid #1a3a3a;
    border-radius: 8px; font-size: 15px; font-weight: 500;
    background: transparent; cursor: pointer; color: #1a3a3a;
    text-decoration: none;
  }

  .container {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 80px); padding: 40px 20px;
  }
  .card {
    background: #fff; border-radius: 20px;
    padding: 48px 44px; width: 100%; max-width: 460px;
    box-shadow: 0 4px 40px rgba(26,140,140,0.08);
  }
  .card h1 {
    font-size: 34px; font-weight: 800; color: #1a3a3a;
    text-align: center; margin-bottom: 32px;
  }

  .error-msg {
    background: #fff0f0; border: 1px solid #ffcccc;
    color: #cc3333; padding: 10px 14px; border-radius: 8px;
    margin-bottom: 20px; font-size: 14px; text-align: center;
  }
  .success-msg {
    background: #f0fff4; border: 1px solid #b3f5cc;
    color: #1a7a40; padding: 10px 14px; border-radius: 8px;
    margin-bottom: 20px; font-size: 14px; text-align: center;
  }

  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 14px; font-weight: 600;
    color: #1a3a3a; margin-bottom: 8px;
  }
  .input-wrap {
    display: flex; align-items: center;
    border: 1.5px solid #d0e8e8; border-radius: 10px;
    padding: 12px 16px; background: #f8fbfb;
    transition: border 0.2s;
  }
  .input-wrap:focus-within { border-color: #1a8c8c; background: #fff; }
  .input-wrap svg { width: 18px; height: 18px; stroke: #8aacac; flex-shrink: 0; }
  .input-wrap input {
    border: none; background: transparent; outline: none;
    font-size: 15px; color: #1a3a3a; width: 100%;
    margin-left: 10px;
  }
  .input-wrap input::placeholder { color: #9ab8b8; }
  .eye-btn {
    background: none; border: none; cursor: pointer;
    padding: 0; color: #8aacac;
  }

  .btn-submit {
    width: 100%; padding: 15px;
    background: #1a8c8c; color: #fff; border: none;
    border-radius: 10px; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px; transition: background 0.2s;
  }
  .btn-submit:hover { background: #157070; }

  .footer-link {
    text-align: center; margin-top: 24px;
    font-size: 14px; color: #4a6a6a;
  }
  .footer-link a { color: #1a8c8c; font-weight: 600; text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <polyline points="3,17 9,11 13,15 21,7"/>
      </svg>
    </div>
    <span class="logo-name">BearingWatch</span>
  </a>
  <div class="nav-links">
    <a href="/">About us</a>
    <a href="/register" class="btn-outline">Register</a>
  </div>
</nav>

<div class="container">
  <div class="card">
    <h1>Login</h1>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="success-msg">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
          <input type="email" name="email" placeholder="Email" required/>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" name="password" id="pwd" placeholder="Password" required/>
          <button type="button" class="eye-btn" onclick="togglePwd()">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit">Log in</button>
    </form>

    <div class="footer-link">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>
</div>

<script>
function togglePwd() {
  const pwd = document.getElementById('pwd');
  pwd.type = pwd.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
